server {
    server_name app.cyna.ubikd.com;
    root /var/www/Cyna/CYNA-frontend-react/dist;
    index index.html;

    access_log /var/log/nginx/cyna-app.access.log;
    error_log  /var/log/nginx/cyna-app.error.log;

    # SPA routing — toujours renvoyer index.html pour react-router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets statiques avec cache long terme (Vite génère des hash dans les noms)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|woff|woff2|ttf|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\.(env|git|htaccess) {
        deny all;
    }
}
