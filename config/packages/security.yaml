security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    role_hierarchy:
        ROLE_ADMIN:       [ROLE_USER]
        ROLE_SUPER_ADMIN: [ROLE_ADMIN]

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        login:
            pattern: ^/api/login
            stateless: true
            json_login:
                check_path: /api/login_check
                username_path: email
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # Endpoints publics d'onboarding (register, verify-email, reset-password, contact, catalog, home).
        # On reste stateless et sans jwt obligatoire.
        api:
            pattern: ^/api
            stateless: true
            jwt: ~
            entry_point: jwt

    # Ordre important : seule la première règle qui matche est appliquée.
    access_control:
        # Auth & onboarding
        - { path: ^/api/login,                  roles: PUBLIC_ACCESS }
        - { path: ^/api/docs,                   roles: PUBLIC_ACCESS }
        - { path: ^/api/users$,                 methods: [POST],   roles: PUBLIC_ACCESS }   # inscription
        - { path: ^/api/verify-email,           roles: PUBLIC_ACCESS }
        - { path: ^/api/password/forgot,        roles: PUBLIC_ACCESS }
        - { path: ^/api/password/reset,         roles: PUBLIC_ACCESS }
        - { path: ^/api/contact,                methods: [POST],   roles: PUBLIC_ACCESS }
        - { path: ^/api/contact_messages,       methods: [POST],   roles: PUBLIC_ACCESS }
        - { path: ^/api/chatbot,                methods: [POST],   roles: PUBLIC_ACCESS }

        # Catalogue / home : lecture libre
        - { path: ^/api/categories,             methods: [GET],    roles: PUBLIC_ACCESS }
        - { path: ^/api/saas_services,          methods: [GET],    roles: PUBLIC_ACCESS }
        - { path: ^/api/home,                   methods: [GET],    roles: PUBLIC_ACCESS }
        - { path: ^/api/carousel_slides,        methods: [GET],    roles: PUBLIC_ACCESS }
        - { path: ^/api/homepage_texts,         methods: [GET],    roles: PUBLIC_ACCESS }

        # Backoffice
        - { path: ^/api/admin,                  roles: ROLE_ADMIN }

        # Tout le reste de l'API demande un JWT valide.
        - { path: ^/api,                        roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
